name: Secret Scan

# Scans committed files (including update-set XML exports) for leaked
# credentials, API keys, tokens, and other secrets using Gitleaks.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan past commits too

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Fail if secrets were found
        if: failure()
        run: |
          echo "::error::Potential secrets were detected in this commit. Review the Gitleaks report above before merging."
          exit 1
